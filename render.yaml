# Render Blueprint: deploy backend API only
# See docs/DEPLOY_RENDER.md for full step-by-step instructions.
services:
  - type: web
    name: devflowos-api
    runtime: go
    rootDir: services/api
    buildCommand: go build -o api ./cmd/api
    startCommand: ./api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
